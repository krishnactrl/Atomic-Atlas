        }

            z-index: 50;

            background: rgba(15,23,42,0.7);

        .glow-halogen { --glow: rgba(139,92,246,0.4); }
        .glow-noble { --glow: rgba(236,72,153,0.4); }
        .glow-lanthanide { --glow: rgba(20,184,166,0.4); }
        .glow-actinide { --glow: rgba(244,63,94,0.4); }
        .element-card:hover {
            box-shadow: 0 0 30px var(--glow), 0 20px 40px -10px rgba(0,0,0,0.3);
        }
        .shell-ring {
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .electron {
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }
        .modal-enter {
            animation: modalIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .search-highlight {
            animation: highlight 0.5s ease;
        }
        @keyframes highlight {
            0% { background: rgba(59,130,246,0.3); }
            100% { background: transparent; }
        }

            background: rgba(59,130,246,0.05);
        }
        .dark .compare-row:hover {
            background: rgba(59,130,246,0.1);
        }
