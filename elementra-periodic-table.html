    <style>
        * { scrollbar-width: thin; scrollbar-color: rgba(156,163,175,0.3) transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156,163,175,0.3); border-radius: 3px; }
        .element-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .element-card:hover {
            transform: translateY(-4px) scale(1.08);
            z-index: 50;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.3);
        }
        .glass {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .dark .glass {
            background: rgba(15,23,42,0.7);
        }
        .glow-alkali { --glow: rgba(239,68,68,0.4); }
        .glow-alkaline { --glow: rgba(249,115,22,0.4); }
        .glow-transition { --glow: rgba(234,179,8,0.4); }
        .glow-postTransition { --glow: rgba(34,197,94,0.4); }
        .glow-metalloid { --glow: rgba(6,182,212,0.4); }
        .glow-nonmetal { --glow: rgba(59,130,246,0.4); }
        .glow-halogen { --glow: rgba(139,92,246,0.4); }
        .glow-noble { --glow: rgba(236,72,153,0.4); }
        .glow-lanthanide { --glow: rgba(20,184,166,0.4); }
        .glow-actinide { --glow: rgba(244,63,94,0.4); }
        .element-card:hover {
            box-shadow: 0 0 30px var(--glow), 0 20px 40px -10px rgba(0,0,0,0.3);
        }
        .shell-ring {
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .electron {
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }
        .modal-enter {
            animation: modalIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .search-highlight {
            animation: highlight 0.5s ease;
        }
        @keyframes highlight {
            0% { background: rgba(59,130,246,0.3); }
            100% { background: transparent; }
        }
        .compare-row:hover {
            background: rgba(59,130,246,0.05);
        }
        .dark .compare-row:hover {
            background: rgba(59,130,246,0.1);
        }

            const shells = [];
            const regex = /(\d)([spdf])(\d+)/g;
            let match;

                shellCounts[s.shell] = (shellCounts[s.shell] || 0) + s.electrons;
            });
            return Object.entries(shellCounts).map(([k, v]) => ({ shell: parseInt(k), count: v }));
        }

        function ShellVisualizer({ config, symbol, darkMode }) {
            const shells = parseElectronConfig(config);
            const maxShell = Math.max(...shells.map(s => s.shell), 1);
            const size = 200;
            const center = size / 2;

            return (
                <div className="relative" style={{ width: size, height: size }}>
                    <div className={`absolute inset-0 rounded-full flex items-center justify-center font-bold text-lg ${darkMode ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-900'}`} style={{ width: 40, height: 40, top: center - 20, left: center - 20 }}>
                        {symbol}
                    </div>
                    {shells.map((shell, idx) => {
                        const radius = 30 + idx * 25;
                        const circumference = 2 * Math.PI * radius;
                        const dashArray = `${circumference * 0.8} ${circumference * 0.2}`;
                        return (
                            <div key={idx} className="absolute rounded-full border-2 border-dashed opacity-60" 
                                 style={{ 
                                     width: radius * 2, 
                                     height: radius * 2, 
                                     top: center - radius, 
                                     left: center - radius,
                                     borderColor: darkMode ? 'rgba(148,163,184,0.4)' : 'rgba(100,116,139,0.3)',
                                     animation: `rotate ${20 + idx * 5}s linear infinite ${idx % 2 === 0 ? 'normal' : 'reverse'}`
                                 }}>
                                {Array.from({ length: shell.count }).map((_, i) => {
                                    const angle = (i / shell.count) * 2 * Math.PI;
                                    const x = center + radius * Math.cos(angle) - 4;
                                    const y = center + radius * Math.sin(angle) - 4;
                                    return (
                                        <div key={i} className="absolute w-2 h-2 rounded-full electron"
                                             style={{ 
                                                 left: x - center + radius, 
                                                 top: y - center + radius,
                                                 background: darkMode ? '#60a5fa' : '#3b82f6'
                                             }}>
                                        </div>
                                    );
                                })}
                            </div>
                        );
                    })}
                </div>
            );

            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [selectedElement, setSelectedElement] = useState(null);
            const [compareElement1, setCompareElement1] = useState(null);
            const [compareElement2, setCompareElement2] = useState(null);
            const [showCompare, setShowCompare] = useState(false);
            const [selectingSecond, setSelectingSecond] = useState(false);
            const searchRef = useRef(null);

            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        setSelectedElement(null);
                        setShowCompare(false);
                        setSelectingSecond(false);
                    }
                    if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
                        e.preventDefault();
                        searchRef.current?.focus();
                    }

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);

            const filteredElements = useMemo(() => {

                    const matchesSearch = !searchQuery || 
                        el.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        el.s.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        el.n.toString() === searchQuery;
                    const matchesCategory = selectedCategory === 'all' || el.cat === selectedCategory;
                    return matchesSearch && matchesCategory;

                                {categoryKeys.map(cat => (
                                    <div key={cat} className="flex items-center gap-2">
                                        <span className={`w-3 h-3 rounded-full ${categories[cat].color}`}></span>
                                        <span className="text-xs">{categories[cat].label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* Modals */}
                    {selectedElement && (
                        <DetailModal 
                            element={selectedElement} 
                            onClose={() => setSelectedElement(null)}
                            onCompare={handleCompare}
                            darkMode={darkMode}
                        />
                    )}

                    {showCompare && (
                        <ComparePanel 
                            element1={compareElement1}
                            element2={compareElement2}
                            onClose={() => {
                                setShowCompare(false);
                                setCompareElement1(null);
                                setCompareElement2(null);
                                setSelectingSecond(false);
                            }}
                            onSelectSecond={() => {
                                setSelectingSecond(true);
                                setShowCompare(false);
                            }}
                            darkMode={darkMode}
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
